<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>John Stick</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0d0d12;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
      }
      /* WS-223 — focus ring only for keyboard Tab; not on programmatic focus in most engines. */
      /* Fallback focus target (`#app` tabindex -1) — no chrome ring on the full-screen shell. */
      #app:focus {
        outline: none;
      }
      #app canvas:focus {
        outline: none;
      }
      #app canvas:focus-visible {
        outline: 2px solid rgba(210, 208, 235, 0.55);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
